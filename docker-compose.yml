version: '3.8'

services:
  # MongoDB database
  mongo:
    image: mongo:7-alpine
    container_name: team-task-manager-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: team-task-manager
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Backend + Frontend application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: team-task-manager-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/team-task-manager
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - ./client:/app/client
      - /app/node_modules
      - /app/server/node_modules
    networks:
      - app-network

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge
